naftiko: 1.0.0-alpha2
info:
  label: AppConnect V3 — Email Campaigns
  description: 'AppConnect V3 — Email Campaigns. 11 operations. Lead operation: GET a Collection of Email Campaigns. Self-contained
    Naftiko capability covering one Constant Contact business surface.'
  tags:
  - Constant Contact
  - Email Campaigns
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CONSTANT_CONTACT_API_KEY: CONSTANT_CONTACT_API_KEY
capability:
