  - type: http
    namespace: v3-email-campaigns
    baseUri: https://api.cc.email/v3
    description: AppConnect V3 — Email Campaigns business capability. Self-contained, no shared references.
    resources:
    - name: emails
      path: /emails
      operations:
      - name: retrieveemailcampaignsusingget
        method: GET
        description: GET a Collection of Email Campaigns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Specifies the number of campaigns to display on each page of output that is returned (from return 1
            - 500). The default returns 50 campaigns per page.
        - name: before_date
          in: query
          type: string
          description: Use to return email campaigns with `updated_at` timestamps that are before a specific date and time
            (in ISO-8601 format). Use with the `after_date` query parame
        - name: after_date
          in: query
          type: string
          description: Use to return email campaigns with last `updated_at` timestamps that are after a specific date and
            time (in ISO-8601 format). Use with the `before_date` query p
      - name: createemailcampaignusingpost
        method: POST
        description: POST (Create) a New Email Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: string
          description: A JSON request body that contains the email content.
          required: true
    - name: emails-activities-campaign_activity_id
      path: /emails/activities/{campaign_activity_id}
      operations:
      - name: retrieveemailcampaignactivityusingget
        method: GET
        description: GET a Single Email Campaign Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_activity_id
          in: path
          type: string
          description: The unique ID for an email campaign activity.
          required: true
        - name: include
          in: query
          type: string
          description: Use the `include` query parameter to enter a comma separated list of additional email campaign activity
            properties for the V3 API to return. Valid values are `p
      - name: updateemailcampaignactivityusingput
        method: PUT
        description: PUT (Update) An Email Campaign Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_activity_id
          in: path
          type: string
          description: The unique ID for the email campaign activity you are updating.
          required: true
        - name: body
          in: body
          type: string
          description: A request body payload that contains the complete email campaign activity with your changes.
          required: true
    - name: emails-activities-campaign_activity_id-non_opener_resends
      path: /emails/activities/{campaign_activity_id}/non_opener_resends
      operations:
      - name: retrieveresendtononopenersusingget
        method: GET
        description: GET Details for a Resend to Non-openers Campaign Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_activity_id
          in: path
          type: string
          description: The unique ID for the primary email campaign activity.
          required: true
      - name: createresendtononopenersusingpost
        method: POST
        description: POST a Resend to Non-openers Campaign Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_activity_id
          in: path
          type: string
          description: The unique ID for the primary email campaign activity.
          required: true
        - name: resend_schedule
          in: body
          type: string
          description: A JSON request body that specifies when to resend the campaign activity to non-openers.
          required: true
    - name: emails-activities-campaign_activity_id-non_opener_resends-resend_request_id
      path: /emails/activities/{campaign_activity_id}/non_opener_resends/{resend_request_id}
      operations:
      - name: deleteresendtononopenersusingdelete
        method: DELETE
        description: DELETE a Resend to Non Openers Activity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_activity_id
          in: path
          type: string
          description: The unique ID for the primary email campaign activity.
          required: true
        - name: resend_request_id
          in: path
          type: string
          description: 'The unique ID associated with the resend for the email campaign activity (for example: `389093`).
            If the email campaign activity is currently in draft status, s'
          required: true
    - name: emails-campaign_id_xrefs
      path: /emails/campaign_id_xrefs
      operations:
      - name: retrievexrefmappingsusingget
        method: GET
        description: GET a Collection of V2 and V3 API Email Campaign Identifiers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
