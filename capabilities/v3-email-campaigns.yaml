          in: path
          type: string
          description: The ID (UUID format) that uniquely identifies this email campaign.
          required: true
      - name: removeemailcampaignusingdelete
        method: DELETE
        description: DELETE an Email Campaign
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique ID for the email campaign you are deleting.
          required: true
      - name: renameemailcampaignusingpatch
        method: PATCH
        description: PATCH (Update) an Email Campaign Name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: campaign_id
          in: path
          type: string
          description: The unique identifier for an email campaign.
          required: true
        - name: body
          in: body
          type: string
          description: A JSON payload that contains the new email campaign name.
          required: true
