      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-bulk-activities.posttagaddcontact
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-tags-contacts
      description: Remove Tags from Contacts
      hints:
