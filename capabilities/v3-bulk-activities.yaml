      call: v3-bulk-activities.posttagdelete
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-custom-fields
      description: Delete Custom Fields
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: v3-bulk-activities.postcustomfielddelete
      with:
        body: tools.body
      outputParameters:
      - type: object
