      list_ids:
        type: array
        description: Exports all of the contacts inside of up to 50 contact lists. This property is mutually exclusive with all other filtering criteria except with either <code>status</code> or <code>exclude</code>.
        items:
          type: string
          format: uuid
          example: 04fe9a97-a579-43c5-bb1a-58ed29bf0a6a
        maxItems: 50
      tag_ids:
        type: array
        description: Exports contacts assigned one or more of the tags (<code>tag_id</code>) specified. This property is mutually exclusive with all other filtering criteria.
        items:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        maxItems: 50
      new_subscriber:
        type: boolean
        example: true
        description: 'Set to <code>true</code> to only export contacts that subscribed within the last 30 days. Default setting is <code>false</code>. This property is mutually exclusive with all other filtering criteria except  with either  <code>list_ids</code> or <code>exclude</code>. '
      segment_id:
        type: integer
        example: 12
        description: Specify the <code>segment_id</code> from which you want to export all contacts that meet the specified <code>segment_criteria</code>. You can only specify one <code>segment_id</code>. This property is mutually exclusive with all other filtering criteria.
      fields:
        type: array
        description: By default , all fields are returned. Use this array to only export specific contact fields. You must export <code>email_address</code> to successfully export <code>email_optin_source</code>, <code>email_optin_date</code>, <code>email_optout_source</code>, <code>email_optout_date</code>, or <code>email_optout_reason</code>.
        items:
          type: string
          example: email_address
      status:
        type: string
        example: unsubscribed
        description: Allows you to export only contacts that have a specific status value. This property is mutually exclusive with all other filtering criteria except with either  <code>contact_ids</code> or <code>list_ids</code>.
      exclude:
        type: object
        properties:
          contact_ids:
            type: array
            description: Excludes up to 50 specified contacts (<code>contact_id</code>) from being exported. This property is mutually exclusive with all other filtering criteria except  with either <code>list_ids</code> or <code>new_subscriber</code> .
            items:
              type: string
              format: uuid
              example: 4d88f172-21d1-11ea-b5ae-fa163e56c9b0
              description: An array of <code>contact_id</code>s to exclude.
    description: Export contact objects to a CSV file. By default, all contacts in the user's account are exported unless a filtering parameter is specified.
