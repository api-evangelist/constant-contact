  JsonImportContact:
    type: object
    properties:
      email:
        type: string
        example: joe.jones@example.com
        description: The email address of the contact. This method identifies each unique contact using their email address. Required if `sms_number` is not specified.
        maxLength: 50
      first_name:
        type: string
        example: Joe
        description: The first name of the contact.
        maxLength: 50
      last_name:
        type: string
        example: Jones
        description: The last name of the contact.
        maxLength: 50
      job_title:
        type: string
        example: Chief Innovation Officer
        description: The job title of the contact.
        maxLength: 50
      company_name:
        type: string
        example: RelativeGravity, Inc.
        description: The name of the company where the contact works.
        maxLength: 50
      birthday_month:
        type: integer
        example: 11
        description: The month value for the contact's birthday. Valid values are from 1 through 12. The <code>birthday_month</code> property is required if you use <code>birthday_day</code>.
      birthday_day:
        type: integer
        example: 24
        description: The day value for the contact's birthday. Valid values are from 1 through 31. The <code>birthday_day</code> property is required if you use <code>birthday_month</code>.
      anniversary:
        type: string
        example: '2006-11-15'
        description: The anniversary date for the contact. For example, this value could be the date when the contact first became a customer of an organization in Constant Contact. Valid date formats are MM/DD/YYYY, M/D/YYYY, YYYY/MM/DD, YYYY/M/D, YYYY-MM-DD, YYYY-M-D,M-D-YYYY, or M-DD-YYYY.
      phone:
        type: string
        example: 555-555-5555
        description: The primary phone number for the contact. Use this field to add the default kind of phone number to the imported contact's phone number. Default <code>kind</code> is <code>other</code>.
        maxLength: 50
      home_phone:
        type: string
        example: 555-555-5555
        description: The home phone number for the contact.
        maxLength: 50
      work_phone:
        type: string
        example: 555-555-4444
        description: The work phone number for the contact.
        maxLength: 50
      mobile_phone:
        type: string
        example: 555-555-3333
        description: The mobile phone number for the contact.
        maxLength: 50
      other_phone:
        type: string
        example: 555-555-2222
        description: A phone number for the contact.
        maxLength: 50
      street:
        type: string
        example: 123 Maple Lane
        description: Line one of the primary street address for the contact. Use this field to add the default kind of street to the imported contact's street address. The default <code>kind</code> is <code>home</code>. which maps to the <code>street_addresses</code> array` in the response.
        maxLength: 255
      street2:
        type: string
        example: Apt. 337
        description: Line two of the primary street address for the contact. This value is automatically appended to the <code>street</code> value. Use this field to add the default kind for line two of the street address to the imported contact's address. The default <code>kind</code> is <code>other</code>.
        maxLength: 255
      city:
        type: string
        example: Chicago
        description: The name of the primary city for the contact. Use this field to add the default kind of city to the imported contact's home address. The default <code>kind</code> is <code>home</code>.
        maxLength: 50
      state:
        type: string
        example: Illinois
        description: The name of the primary state or province for the contact. Use this field to add the default kind of state to the imported contact's home address. The default <code>kind</code> is <code>home</code>.
        maxLength: 50
      zip:
        type: string
        example: '60609'
        description: The zip or postal code associated with the contact's primary address. Use this field to add the default kind of zip to the imported contact's street address. The default <code>kind</code> is <code>home</code>.
        maxLength: 50
      country:
        type: string
        example: United States
        description: The name of the primary country where the contact is located. Use this field to add the default kind of country to the imported contact's street address. The default <code>kind</code> is <code>home</code>.
        maxLength: 50
      home_street:
        type: string
        example: 123 Maple Lane
        description: Line one of the home street address for the contact.
        maxLength: 255
      home_street2:
        type: string
        example: Apt. 337
        description: Line two of the home street address for the contact. This value is automatically appended to the <code>home_street</code> value.
        maxLength: 255
      home_city:
        type: string
        example: Chicago
        description: The name of the city where the contact lives.
        maxLength: 50
      home_state:
        type: string
        example: Illinois
        description: The name of the home state or province where the contact lives.
        maxLength: 50
      home_zip:
        type: string
        example: '60609'
        description: The zip or postal code associated with the contact's home address.
        maxLength: 50
      home country:
        type: string
        example: United States
        description: The name of the country where the contact lives.
        maxLength: 50
      work_street:
        type: string
        example: 123 Maple Lane
        description: Line one of the work street address for the contact.
        maxLength: 255
      work_street2:
        type: string
        example: Apt. 337
        description: Line two of the work street address for the contact. This value is automatically appended to the <code>work_street</code> value.
        maxLength: 255
      work_city:
        type: string
        example: Chicago
        description: The name of the city where the contact works.
        maxLength: 50
      work_state:
        type: string
        example: Illinois
        description: The name of the state or province where the contact works.
        maxLength: 50
      work_zip:
        type: string
        example: '60609'
        description: The zip or postal code associated with the contact's work address.
        maxLength: 50
      work_country:
        type: string
        example: United States
        description: The name of the country where the contact works.
        maxLength: 50
      other_street:
        type: string
        example: 123 Maple Lane
        description: Line one of the other street address for the contact.
        maxLength: 255
      other_street2:
        type: string
        example: Apt. 337
        description: Line two of the other street address for the contact. This value is automatically appended to the <code>other_street</code> value.
        maxLength: 255
      other_city:
        type: string
        example: Chicago
        description: The name of another city where the contact is located.
        maxLength: 50
      other_state:
        type: string
        example: Illinois
        description: The name of another state or province where the contact is located.
        maxLength: 50
      other_zip:
        type: string
        example: '60609'
        description: The zip or postal code associated with the contact's other address.
        maxLength: 50
      other_country:
        type: string
        example: Canada
        description: The name of another country where the contact is located.
        maxLength: 50
      cf:custom_field_name:
        type: string
        example: Tesla S 2017
        description: The name of this property is dynamic based on the custom fields you want to import. Use a key-value pair where the key is an existing custom field name prefixed with <code>cf:</code>, and the value is a custom field string value. For example, if you have a custom field named <code>first_name</code> you can use <code>"cf:first_name":"Joe"</code>. Each contact can contain up to 25 different custom fields.
        maxLength: 255
      sms_number:
        type: string
        example: '5081231235'
