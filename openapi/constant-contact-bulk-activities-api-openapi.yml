      source:
        type: object
        description: Specifies the contacts to remove from your target list(s) using one of several mutually exclusive properties.
        properties:
          list_ids:
            type: array
            description: Include up to 50 <code>list_id</code> values to remove all contact list members from your target list(s). This property is mutually exclusive with all other <code>source</code> properties.
            items:
              type: string
              format: uuid
              example: 5bbf758c-d8ce-11e9-8d3a-fa163e56c9b0
            maxItems: 0
          contact_ids:
            type: array
