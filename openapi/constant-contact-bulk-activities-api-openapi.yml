        properties:
          contact_ids:
            type: array
            description: An array of contacts IDs.
            items:
              type: string
              format: uuid
              example: 358f6a5e-21f6-11ea-a1cb-fa163e56c9b0
            maxItems: 500
          list_ids:
            type: array
