            maxItems: 50
          all_active_contacts:
            type: boolean
            example: false
            description: Use to identify contacts with an active (billable) status.
          new_subscriber:
            type: boolean
            example: true
            description: Use to identify newly subscribed contacts.
      exclude:
        type: object
        description: Use to exclude specified contacts from being added or removed from a tag. Only applicable if the specified source is either <code>all_active_contacts</code> (billable) or <code>list_ids</code>.
        properties:
          contact_ids:
            type: array
            description: Identifies the contacts, by <code>contact_id</code>, to exclude from the add or remove tags activity.
            items:
              type: string
              format: uuid
              example: c7172ca0-f353-11e8-aff2-fa163e56c9b0
      tag_ids:
