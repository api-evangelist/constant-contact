  ListActivityAddContacts:
    type: object
    required:
    - list_ids
    - source
    properties:
      source:
        type: object
        description: The <code>source</code> object specifies which contacts you are adding to your targeted lists using one of four mutually exclusive properties.
        properties:
          list_ids:
            type: array
            description: Specifies which contacts you are adding to lists as an array of up to 50 contact <code>list_id</code> values. This property is mutually exclusive with <code>contact_ids</code>, <code>all_active_contacts</code> (billable), and <code>segment_id</code>.
            items:
              type: string
              format: uuid
              example: 04fe9a97-a579-43c5-bb1a-58ed29bf0a6a
            maxItems: 50
          all_active_contacts:
            type: boolean
            example: true
            description: Adds all active (billable) contacts to your targeted lists. This property is mutually exclusive with <code>contact_ids</code>, <code>list_ids</code>, and <code>segment_id</code>.
            default: false
          contact_ids:
            type: array
            description: Specifies which contacts (up to 500) you are adding to lists as an array of <code>contact_id</code> values. This property is mutually exclusive with <code>list_ids</code>, <code>all_active_contacts</code> (billable), and <code>segment_id</code>.
            items:
              type: string
              format: uuid
              example: 04fe9a97-a579-43c5-bb1a-58ed29bf0a6a
            maxItems: 500
          tag_ids:
            type: array
            description: Adds all contacts assigned with the specified <code>tag_id</code>s to your target lists. This property is mutually exclusive with all other <code>source</code> properties.
            items:
              type: string
              format: uuid
              example: 5e88f172-21d1-11ea-b5ae-fa163e56c9b9
            maxItems: 0
          engagement_level:
            type: string
            example: high
            description: Adds all contacts that meet the selected  <code>engagement_level </code> to your target lists. This property is mutually exclusive with all other <code>source</code> properties.
          segment_id:
            type: integer
            example: 12
            description: Specifies which contacts you are adding to lists as a single <code>segment_id</code> value. This property is mutually exclusive with <code>list_ids</code>, <code>all_active_contacts</code> (billable), and <code>contact_ids</code>.
      exclude:
        type: object
        properties:
          contact_ids:
            type: array
            description: Excludes specified contacts (<code>contact_id</code>) from being added to the target list. Applicable if using either the <code>all_active_contacts</code> (billable) or <code>list_ids</code> as the source.
            items:
              type: string
              format: uuid
              example: 4d88f172-21d1-11ea-b5ae-fa163e56c9b0
              description: An array of <code>contact_id</code>s to exclude.
      list_ids:
        type: array
        description: Specifies which lists (up to 50) you are adding your source contacts to.
        items:
          type: string
          format: uuid
          example: 04fe9a97-a579-43c5-bb1a-58ed29bf0a6a
        maxItems: 50
