            items:
              type: string
              format: uuid
              example: 4d88f172-21d1-11ea-b5ae-fa163e56c9b0
            maxItems: 0
          all_active_contacts:
            type: boolean
            example: true
            description: Removes all active (billable) contacts from your targeted lists. This property is mutually exclusive with all other <code>source</code> properties.
            default: false
          engagement_level:
            type: string
