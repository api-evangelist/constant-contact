description: >-
  Constant Contact is a small-business email and digital marketing platform
  offering email campaigns, automation, SMS, contact management, surveys, and
  events. The Constant Contact V3 API is a REST + JSON, OAuth2-protected
  service published at api.cc.email/v3 covering accounts, contacts, lists,
  tags, custom fields, segments, email campaigns, A/B tests, schedules and
  tests, bulk activities (CSV/JSON import, export, list and tag mutations),
  events with registration and check-in, reporting, and partner provisioning.
apis:
  - aid: constant-contact:v3
    name: Constant Contact V3 API
    tags:
      - Campaigns
      - Contacts
      - Email Marketing
      - Events
      - OAuth2
      - REST
      - SMS
    humanURL: https://developer.constantcontact.com/
    baseURL: https://api.cc.email/v3
    properties:
      - url: https://developer.constantcontact.com/
        type: Documentation
      - url: https://developer.constantcontact.com/api_guide/index.html
        type: Getting Started
      - url: https://developer.constantcontact.com/api_guide/auth_overview.html
        type: Authentication
      - url: https://api.cc.email/v3/swagger.yaml
        type: OpenAPI
      - url: openapi/constant-contact-v3-openapi.yml
        type: OpenAPI
    description: >-
      Production REST API for Constant Contact's email marketing, SMS, and
      events platform. OAuth2 authorization (auth code, PKCE, and JWT-bearer
      flows) gates all endpoints across account services, contacts, contact
      lists, tags, custom fields, segments, email campaigns and activities
      (with A/B tests, schedules, and tests), bulk activities for high-volume
      mutations, events (registrations, tracks, check-in, payment status),
      contact reporting, landing pages, and partner technology-account
      provisioning.
