description: Constant Contact is a small-business email and digital marketing platform
  offering email campaigns, automation, SMS, contact management, surveys, and events.
  The Constant Contact V3 API is a REST + JSON, OAuth2-protected service published
  at api.cc.email/v3 covering accounts, contacts, lists, tags, custom fields, segments,
  email campaigns, A/B tests, schedules and tests, bulk activities (CSV/JSON import,
  export, list and tag mutations), events with registration and check-in, reporting,
  and partner provisioning.
