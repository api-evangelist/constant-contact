specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Constant Contact
providerId: constant-contact
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Email
description: Constant Contact v3 API rate limits per app.
sources:
  - https://www.constantcontact.com/pricing
  - https://developer.constantcontact.com/api_guide/rate_limits.html
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: REST API v3
    scope: app
    metric: requests_per_second
    limit: 4
    timeFrame: second
  - name: REST API v3 daily
    scope: app
    metric: requests_per_day
    limit: 10000
    timeFrame: day
  - name: Bulk activities
    scope: app
    metric: concurrent
    limit: 5
