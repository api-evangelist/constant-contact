# ---------------------------------------------------------------------------
# Root Types
# ---------------------------------------------------------------------------

type Query {
  # Account
  account: Account
  accountSummary: AccountSummary

  # Contacts
  contact(contactId: ID!): Contact
  contacts(
    status: ContactStatus
    listId: ID
    tagId: ID
    limit: Int
    cursor: String
  ): ContactConnection!

  # Lists
  emailList(listId: ID!): EmailList
  emailLists(limit: Int, cursor: String): EmailListConnection!

  # Tags
  tag(tagId: ID!): Tag
  tags(limit: Int, cursor: String): TagConnection!

  # Custom Fields
  customField(customFieldId: ID!): CustomField
  customFields: [CustomField!]!

  # Segments
  segment(segmentId: ID!): Segment
  segments(limit: Int, cursor: String): SegmentConnection!

  # Email Campaigns
  emailCampaign(campaignId: ID!): EmailCampaign
  emailCampaigns(
    status: CampaignStatus
    limit: Int
    cursor: String
  ): EmailCampaignConnection!

  # Campaign Activities
  campaignActivity(campaignActivityId: ID!): CampaignActivity
  campaignSummary(campaignActivityId: ID!): CampaignSummary

  # Reporting
  emailOpens(campaignActivityId: ID!, limit: Int, cursor: String): EmailOpenConnection!
  linkClicks(campaignActivityId: ID!): [LinkClicks!]!
  unsubscribedContacts(campaignActivityId: ID!, limit: Int, cursor: String): UnsubscribedContactConnection!
  bouncedContacts(campaignActivityId: ID!, limit: Int, cursor: String): BouncedContactConnection!

  # Bulk Activities
  bulkActivity(activityId: ID!): BulkActivity
  bulkActivities(limit: Int, cursor: String): BulkActivityConnection!

  # Domain Authentication
  domainAuthentications: [DomainAuthentication!]!

  # Events
  event(eventId: ID!): Event
  events(status: EventStatus, limit: Int, cursor: String): EventConnection!
  eventRegistrations(eventId: ID!, limit: Int, cursor: String): EventRegistrationConnection!
  registrant(registrantId: ID!): Registrant

  # Tickets & Orders
  ticketTypes(eventId: ID!): [TicketType!]!
  order(orderId: ID!): Order
  discounts(eventId: ID!): [Discount!]!

  # Forms & Landing Pages
  form(formId: ID!): Form
  forms(limit: Int, cursor: String): FormConnection!
  landingPage(landingPageId: ID!): LandingPage
  landingPages(limit: Int, cursor: String): LandingPageConnection!
  webSignup(webSignupId: ID!): WebSignup
  webSignups(limit: Int, cursor: String): WebSignupConnection!

  # Auth & Webhooks
  apiKeys: [APIKey!]!
  webhooks: [Webhook!]!

  # Integrations
  integrations: [Integration!]!

  # Plan & Billing
  plan: Plan
  billingInfo: BillingInfo
  usage: Usage

  # Phone Lists
  phoneList(phoneListId: ID!): PhoneList
  phoneLists: [PhoneList!]!
}

type Mutation {
  # Contacts
  createContact(input: CreateContactInput!): Contact
  updateContact(contactId: ID!, input: UpdateContactInput!): Contact
  deleteContact(contactId: ID!): Boolean

  # Notes
  createNote(contactId: ID!, content: String!): Note
  updateNote(noteId: ID!, content: String!): Note
  deleteNote(noteId: ID!): Boolean

  # Lists
  createEmailList(name: String!, description: String): EmailList
  updateEmailList(listId: ID!, name: String, description: String): EmailList
  deleteEmailList(listId: ID!): Boolean
  addContactsToList(listId: ID!, contactIds: [ID!]!): Boolean
  removeContactsFromList(listId: ID!, contactIds: [ID!]!): Boolean

  # Tags
  createTag(name: String!): Tag
  updateTag(tagId: ID!, name: String!): Tag
  deleteTag(tagId: ID!): Boolean
  addTagsToContact(contactId: ID!, tagIds: [ID!]!): Boolean
  removeTagsFromContact(contactId: ID!, tagIds: [ID!]!): Boolean

  # Custom Fields
  createCustomField(name: String!, type: CustomFieldType!): CustomField
  updateCustomField(customFieldId: ID!, name: String!): CustomField
  deleteCustomField(customFieldId: ID!): Boolean

  # Segments
  createSegment(name: String!, segmentCriteria: JSON!): Segment
  updateSegment(segmentId: ID!, name: String, segmentCriteria: JSON): Segment
  deleteSegment(segmentId: ID!): Boolean

  # Email Campaigns
  createEmailCampaign(name: String!, type: String): EmailCampaign
  updateEmailCampaign(campaignId: ID!, name: String): EmailCampaign
  deleteEmailCampaign(campaignId: ID!): Boolean
  scheduleActivity(campaignActivityId: ID!, scheduledDate: DateTime!): ScheduledActivity
  cancelScheduledActivity(campaignActivityId: ID!): Boolean
  testSendActivity(campaignActivityId: ID!, emailAddresses: [EmailAddress!]!): Boolean

  # Bulk Activities
  createBulkActivity(input: BulkActivityInput!): BulkActivity

  # Events
  createEvent(input: CreateEventInput!): Event
  updateEvent(eventId: ID!, input: UpdateEventInput!): Event
  deleteEvent(eventId: ID!): Boolean
  cancelEvent(eventId: ID!): Event
  createTicketType(eventId: ID!, input: CreateTicketTypeInput!): TicketType
  updateTicketType(ticketId: ID!, input: UpdateTicketTypeInput!): TicketType
  deleteTicketType(ticketId: ID!): Boolean
  createDiscount(eventId: ID!, input: CreateDiscountInput!): Discount
  updateRegistrationPaymentStatus(registrationId: ID!, paymentStatus: PaymentStatus!): Registration

  # Forms
  createForm(name: String!, description: String): Form
  updateForm(formId: ID!, name: String, description: String): Form
  deleteForm(formId: ID!): Boolean

  # Landing Pages
  createLandingPage(name: String!, title: String): LandingPage
  updateLandingPage(landingPageId: ID!, name: String, title: String): LandingPage
  deleteLandingPage(landingPageId: ID!): Boolean
  publishLandingPage(landingPageId: ID!): LandingPage
  unpublishLandingPage(landingPageId: ID!): LandingPage

  # WebSignups
  createWebSignup(name: String!, listId: ID!): WebSignup
  updateWebSignup(webSignupId: ID!, name: String, listId: ID): WebSignup
  deleteWebSignup(webSignupId: ID!): Boolean

  # Webhooks
  createWebhook(hookUrl: URL!, events: [WebhookEventType!]!): Webhook
  updateWebhook(webhookId: ID!, hookUrl: URL, events: [WebhookEventType!]): Webhook
  deleteWebhook(webhookId: ID!): Boolean

  # Domain Authentication
  authenticateDomain(domainName: String!): DomainAuthentication
}

