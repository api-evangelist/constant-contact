"""
Constant Contact V3 API – Conceptual GraphQL Schema
Generated from the Constant Contact REST API v3 (api.cc.email/v3).
Covers accounts, contacts, lists, tags, custom fields, segments,
email campaigns, activities, bulk operations, events, reporting,
landing pages, webhooks, and partner provisioning.
"""

# ---------------------------------------------------------------------------
# Scalars
# ---------------------------------------------------------------------------

scalar DateTime
scalar Date
scalar JSON
scalar URL
scalar EmailAddress

# ---------------------------------------------------------------------------
# Enums
# ---------------------------------------------------------------------------

enum CampaignStatus {
  DRAFT
  SCHEDULED
  EXECUTING
  DONE
  ERROR
  REMOVED
}

enum ActivityStatus {
  DRAFT
  SCHEDULED
  EXECUTING
  DONE
  ERROR
}

enum ContactStatus {
  ACTIVE
  UNSUBSCRIBED
  BOUNCED
  DELETED
  SUSPENDED
}

enum BulkActivityType {
  ADD_CONTACTS
  REMOVE_CONTACTS
  EXPORT_CONTACTS
  ADD_LIST_MEMBERSHIPS
  REMOVE_LIST_MEMBERSHIPS
  IMPORT_CONTACTS
}

enum PhoneType {
  HOME
  WORK
  MOBILE
  FAX
  OTHER
}

enum AddressType {
  HOME
  WORK
  OTHER
}

enum CustomFieldType {
  STRING
  DATE
}

enum SegmentCriteriaType {
  CONTACT_FIELD
  LIST_MEMBERSHIP
  EMAIL_ENGAGEMENT
  PURCHASE_HISTORY
}

enum WebhookEventType {
  CONTACT_CREATED
  CONTACT_UPDATED
  CONTACT_DELETED
  EMAIL_CAMPAIGN_SCHEDULED
  EMAIL_CAMPAIGN_SENT
  EMAIL_OPENED
  EMAIL_CLICKED
  EMAIL_BOUNCED
  EMAIL_UNSUBSCRIBED
}

enum PaymentStatus {
  PAID
  PENDING
  REFUNDED
  CANCELLED
}

enum TicketStatus {
  AVAILABLE
  SOLD_OUT
  CANCELLED
}

enum EventStatus {
  DRAFT
  ACTIVE
  CANCELLED
  COMPLETED
}

enum PlanType {
  LITE
  STANDARD
  PREMIUM
  TRIAL
}

enum FormFieldType {
  TEXT
  EMAIL
  PHONE
  DATE
  DROPDOWN
  CHECKBOX
  RADIO
  HIDDEN
}

enum BounceCategory {
  HARD_BOUNCE
  SOFT_BOUNCE
  BLOCKED
}

enum SMSStatus {
  OPTED_IN
  OPTED_OUT
  NON_SUBSCRIBER
}

# ---------------------------------------------------------------------------
